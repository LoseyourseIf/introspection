# ==========================================================
# PostgreSQL 从库 - PersistentVolumeClaim
# 用于数据持久化存储
# ==========================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-slave-data
  namespace: postgres-15-alpine-master-slave
  labels:
    app: postgres-ha
    role: slave
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "rook-ceph-block"
  resources:
    requests:
      storage: 50Gi
