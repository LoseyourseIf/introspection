# ==========================================================
# PostgreSQL 从库 - StatefulSet
# ==========================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-slave
  namespace: postgres-15-alpine-master-slave
  labels:
    app: postgres-ha
    role: slave
spec:
  serviceName: postgres-slave
  replicas: 1
  selector:
    matchLabels:
      app: postgres-ha
      role: slave
  template:
    metadata:
      labels:
        app: postgres-ha
        role: slave
    spec:
      # 从库需要等待主库就绪后才能启动
      initContainers:
        - name: wait-for-master
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "等待主库就绪..."
              until nc -z postgres-master-nodeport 5432; do
                echo "主库尚未就绪，等待 2 秒..."
                sleep 2
              done
              echo "主库已就绪！"

      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP

          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_SLAVE_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: REPLICATION_PASSWORD

          # 资源限制
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "24Gi"
              cpu: "12"

          volumeMounts:
            # 数据目录
            - name: data
              mountPath: /var/lib/postgresql/data
            # 从库启动脚本
            - name: entrypoint-script
              mountPath: /entrypoint-slave.sh
              subPath: entrypoint-slave.sh
            # 自定义配置
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf

          # 使用自定义 entrypoint 脚本
          command:
            - /bin/bash
            - /entrypoint-slave.sh
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"

          # 健康检查
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-slave-data
        - name: entrypoint-script
          configMap:
            name: postgres-slave-config
            items:
              - key: entrypoint-slave.sh
                path: entrypoint-slave.sh
                mode: 0755
        - name: postgres-config
          configMap:
            name: postgres-slave-config
            items:
              - key: postgresql.conf
                path: postgresql.conf